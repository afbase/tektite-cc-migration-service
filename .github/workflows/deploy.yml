name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          
      - name: Cache cargo dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
          
      - name: Install Dioxus CLI
        run: |
          if ! command -v dx &> /dev/null; then
            echo "Installing Dioxus CLI..."
            cargo install dioxus-cli
          else
            echo "Dioxus CLI already installed: $(dx --version)"
          fi
        
      - name: Build for GitHub Pages
        run: |
          echo "Building Dioxus web application..."
          dx build --platform web -p web --release --verbose
          
          echo "Build completed successfully!"
          echo "Checking output directory..."
          ls -la ./target/dx/web/release/web/public/
        
      - name: Create CNAME file for custom domain
        run: |
          echo "tektite.cc" > ./target/dx/web/release/web/public/CNAME
          echo "Created CNAME file for custom domain: tektite.cc"
          
      - name: Add 404 page for SPA routing
        run: |
          # Copy index.html to 404.html for client-side routing support
          if [ -f "./target/dx/web/release/web/public/index.html" ]; then
            cp ./target/dx/web/release/web/public/index.html ./target/dx/web/release/web/public/404.html
            echo "Created 404.html for SPA routing"
          else
            echo "Warning: index.html not found"
          fi
        
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./target/dx/web/release/web/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0